<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Sarabun', Tahoma, sans-serif;
      min-width: 320px;
      padding: 15px;
      text-align: center;
      margin: 0;
      background-color: #f8f9fa;
    }

    h4 {
      margin-top: 5px;
      margin-bottom: 5px;
      color: #0d6efd;
    }

    .btn {
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      font-weight: bold;
      transition: 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background-color: #0d6efd;
    }

    .btn-primary:hover {
      background-color: #0b5ed7;
    }

    .btn-success {
      background-color: #198754;
    }

    .btn-success:hover {
      background-color: #157347;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-secondary:hover {
      background-color: #5c636a;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #198754;
      font-weight: bold;
      min-height: 18px;
    }

    .settings-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      width: 24px;
      height: 24px;
    }

    #settingsPanel {
      display: none;
      text-align: left;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 5px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #0d6efd;
      animation: spin 1s ease-in-out infinite;
      margin-right: 5px;
    }

    .d-flex {
      display: flex !important;
    }

    .gap-2 {
      gap: 0.5rem !important;
    }

    .flex-grow-1 {
      flex-grow: 1 !important;
    }

    .mt-2 {
      margin-top: 0.5rem !important;
    }

    .mb-3 {
      margin-bottom: 1rem !important;
    }

    .btn-outline-primary {
      color: #0d6efd;
      background-color: transparent;
      border: 1px solid #0d6efd;
    }

    .btn-outline-primary:hover {
      color: #fff;
      background-color: #0d6efd;
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="settings-btn" id="toggleSettings">⚙️</div>
  <h4>RiMS E-Claim Sync</h4>
  <p style="font-size: 11px; color: #666; margin-bottom: 15px;">เครื่องมือซิงค์ข้อมูลเข้าสู่ระบบ RiMS</p>

  <div id="mainButtons">
    <button id="syncBtn" class="btn btn-primary">ดึงสถานะ E-Claim</button>
  </div>

  <div id="status"></div>

  <div id="settingsPanel">
    <div class="form-group mb-2">
      <label for="hospCode" class="form-label small">รหัสสถานพยาบาล (5 หลัก):</label>
      <input type="text" id="hospCode" class="form-control form-control-sm" placeholder="เช่น 12345 (เว้นว่างได้)">
    </div>
    <div class="form-group mb-3">
      <label for="apiUrl" class="form-label small">API URL (RiMS):</label>
      <input type="text" id="apiUrl" class="form-control form-control-sm" placeholder="http://127.0.0.1:8000/api">
    </div>
    <div class="d-flex gap-2">
      <button id="saveBtn" class="btn btn-success btn-sm flex-grow-1">บันทึก</button>
      <button id="testBtn" class="btn btn-outline-primary btn-sm flex-grow-1">ทดสอบเชื่อมต่อ</button>
    </div>
    <div id="testResult" class="mt-2 small" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
