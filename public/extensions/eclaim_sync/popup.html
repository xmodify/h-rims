<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Sarabun', Tahoma, sans-serif;
      min-width: 320px;
      padding: 15px;
      text-align: center;
      margin: 0;
      background-color: #f8f9fa;
    }

    h4 {
      margin-top: 5px;
      margin-bottom: 5px;
      color: #0d6efd;
    }

    .btn {
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      font-weight: bold;
      transition: 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary { background-color: #0d6efd; }
    .btn-primary:hover { background-color: #0b5ed7; }
    
    .btn-success { background-color: #198754; }
    .btn-success:hover { background-color: #157347; }

    .btn-secondary { background-color: #6c757d; }
    .btn-secondary:hover { background-color: #5c636a; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #198754;
      font-weight: bold;
      min-height: 18px;
    }

    .settings-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      width: 24px;
      height: 24px;
    }

    #settingsPanel {
      display: none;
      text-align: left;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 5px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }

    /* STM List Styles */
    #stmPanel {
      display: none;
      text-align: left;
      margin-top: 15px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    .stm-header {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stm-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 5px;
      margin-bottom: 10px;
      background: white;
    }
    .stm-item {
      font-size: 11px;
      display: flex;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #fafafa;
    }
    .stm-item:last-child {
      border-bottom: none;
    }
    .stm-checkbox {
      margin-right: 8px;
    }
    .stm-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 10px;
      color: white;
      margin-left: 5px;
      white-space: nowrap;
    }
    .badge-new { background-color: #198754; }
    .badge-exist { background-color: #ffc107; color: #000; }
    
    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      border-top-color: #0d6efd;
      animation: spin 1s ease-in-out infinite;
      margin-right: 5px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="settings-btn" id="toggleSettings">⚙️</div>
  <h4>RiMS E-Claim Sync</h4>
  <p style="font-size: 11px; color: #666; margin-bottom: 15px;">เครื่องมือซิงค์ข้อมูลเข้าสู่ระบบ RiMS</p>

  <div id="mainButtons">
    <button id="syncBtn" class="btn btn-primary">ดึงสถานะ E-Claim</button>
    <button id="stmSyncBtn" class="btn btn-success">ดึงข้อมูล STM</button>
  </div>

  <div id="status"></div>

  <!-- Panel for STM Files -->
  <div id="stmPanel">
    <div class="stm-header">
      <span id="stmCountText">เลือกไฟล์ Statement</span>
      <label style="font-size: 11px; cursor: pointer; display: flex; align-items: center; margin: 0;">
        <input type="checkbox" id="selectAllStm" class="stm-checkbox" checked> เลือกทั้งหมด
      </label>
    </div>
    <div id="stmList" class="stm-list">
      <!-- Items will be injected here -->
    </div>
    <div style="display: flex; gap: 5px;">
      <button id="cancelStmBtn" class="btn btn-secondary" style="flex: 1;">ยกเลิก</button>
      <button id="importStmBtn" class="btn btn-success" style="flex: 2;">นำเข้าสู่ RiMS</button>
    </div>
  </div>

  <div id="settingsPanel">
    <div class="form-group">
      <label>RiMS API URL:</label>
      <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000/api">
      <small style="font-size: 9px; color: #888;">เช่น http://127.0.0.1:8000/api</small>
    </div>
    <button id="saveBtn" class="btn btn-primary" style="padding: 5px; font-size: 12px;">บันทึกการตั้งค่า</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
