<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Sarabun', Tahoma, sans-serif;
      min-width: 320px;
      padding: 15px;
      text-align: center;
      margin: 0;
      background-color: #f8f9fa;
    }

    h4 {
      margin-top: 5px;
      margin-bottom: 5px;
      color: #0d6efd;
    }

    .btn {
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      font-weight: bold;
      transition: 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background-color: #0d6efd;
    }

    .btn-primary:hover {
      background-color: #0b5ed7;
    }

    .btn-success {
      background-color: #198754;
    }

    .btn-success:hover {
      background-color: #157347;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-secondary:hover {
      background-color: #5c636a;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #198754;
      font-weight: bold;
      min-height: 18px;
    }

    .settings-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      width: 24px;
      height: 24px;
    }

    #settingsPanel {
      display: none;
      text-align: left;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 5px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #0d6efd;
      animation: spin 1s ease-in-out infinite;
      margin-right: 5px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="settings-btn" id="toggleSettings">⚙️</div>
  <h4>RiMS E-Claim Sync</h4>
  <p style="font-size: 11px; color: #666; margin-bottom: 15px;">เครื่องมือซิงค์ข้อมูลเข้าสู่ระบบ RiMS</p>

  <div id="mainButtons">
    <button id="syncBtn" class="btn btn-primary">ดึงสถานะ E-Claim</button>
  </div>

  <div id="status"></div>

  <div id="settingsPanel">
    <div class="form-group">
      <label>RiMS API URL:</label>
      <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000/api">
      <small style="font-size: 9px; color: #888;">เช่น http://127.0.0.1:8000/api</small>
    </div>
    <button id="saveBtn" class="btn btn-primary" style="padding: 5px; font-size: 12px;">บันทึกการตั้งค่า</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
