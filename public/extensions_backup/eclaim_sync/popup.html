<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Sarabun', Tahoma, sans-serif;
      min-width: 250px;
      padding: 15px;
      text-align: center;
      margin: 0;
      background-color: #f8f9fa;
    }

    h4 {
      margin-top: 5px;
      margin-bottom: 5px;
      color: #0d6efd;
    }

    button {
      background-color: #0d6efd;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background-color: #0b5ed7;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #198754;
      font-weight: bold;
      min-height: 18px;
    }

    .settings-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      width: 24px;
      height: 24px;
    }

    #settingsPanel {
      display: none;
      text-align: left;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    input {
      width: 100%;
      padding: 5px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="settings-btn" id="toggleSettings">⚙️</div>
  <h4>RiMS E-Claim Sync</h4>
  <p style="font-size: 11px; color: #666; margin-bottom: 15px;">เครื่องมือซิงค์ข้อมูลเข้าสู่ระบบ RiMS</p>

  <button id="syncBtn">ดึงข้อมูลเข้าสู่ RiMS</button>
  <div id="status"></div>

  <div id="settingsPanel">
    <div class="form-group">
      <label>RiMS API URL:</label>
      <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000/api/eclaim/sync">
    </div>
    <button id="saveBtn" style="padding: 5px; font-size: 12px;">บันทึกการตั้งค่า</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
